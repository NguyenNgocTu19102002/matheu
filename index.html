<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trắc nghiệm Tin Mừng Mát-thêu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f172a;--sur:#1e293b;--sur2:#273549;--bdr:#334155;
      --acc:#3b82f6;--acc2:#2563eb;--ok:#22c55e;--err:#ef4444;
      --txt:#f1f5f9;--muted:#94a3b8;--r:14px;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);
         min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}

    .screen{display:none;width:100%;animation:fadeUp .3s ease}
    .screen.active{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    /* ────── START ────── */
    #s-start{max-width:500px;text-align:center}
    .logo{font-size:60px;margin-bottom:18px;animation:bob 3s ease-in-out infinite}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    h1{font-size:clamp(20px,5vw,28px);font-weight:700;line-height:1.3;margin-bottom:8px}
    .sub{color:var(--muted);font-size:14px;margin-bottom:28px}
    .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
    .card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:16px 10px}
    .card .n{font-size:26px;font-weight:700;color:var(--acc)}
    .card .l{font-size:11px;color:var(--muted);margin-top:3px}
    .sec{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);
          padding:18px;margin-bottom:14px;text-align:left}
    .sec h3{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px}
    .pills{display:flex;gap:8px;flex-wrap:wrap}
    .pill{flex:1;min-width:80px;padding:9px 12px;border-radius:10px;border:1px solid var(--bdr);
           background:var(--sur2);color:var(--muted);font-family:inherit;font-size:13px;
           cursor:pointer;transition:all .18s;text-align:center}
    .pill.on{border-color:var(--acc);background:rgba(59,130,246,.15);color:var(--acc);font-weight:600}
    .pill:hover:not(.on){border-color:#475569;color:var(--txt)}
    .btn-main{width:100%;padding:15px;background:var(--acc);color:#fff;font-family:inherit;
               font-size:15px;font-weight:600;border:none;border-radius:var(--r);cursor:pointer;transition:all .18s}
    .btn-main:hover{background:var(--acc2);transform:translateY(-1px)}

    /* ────── QUIZ ────── */
    #s-quiz{max-width:680px}
    .qhdr{display:flex;align-items:center;gap:10px;margin-bottom:18px}
    .pinfo{flex:1}
    .plabel{font-size:12px;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:5px}
    .pbar{height:6px;background:var(--sur2);border-radius:99px;overflow:hidden}
    .pfill{height:100%;background:linear-gradient(90deg,var(--acc),#60a5fa);border-radius:99px;transition:width .4s}
    .hdr-btns{display:flex;gap:8px;flex-shrink:0}
    .hbtn{background:var(--sur);border:1px solid var(--bdr);color:var(--muted);
           padding:8px 12px;border-radius:8px;font-size:12px;font-family:inherit;
           cursor:pointer;transition:all .18s;white-space:nowrap;display:flex;align-items:center;gap:5px}
    .hbtn:hover{color:var(--txt);border-color:#475569}
    .hbtn .badge{background:var(--acc);color:#fff;border-radius:99px;
                  padding:1px 6px;font-size:10px;font-weight:700}

    .qcard{background:var(--sur);border:1px solid var(--bdr);border-radius:18px;
            padding:26px 24px;margin-bottom:14px}
    .qnum{font-size:11px;color:var(--acc);font-weight:600;text-transform:uppercase;
           letter-spacing:.8px;margin-bottom:10px}
    .qtxt{font-size:clamp(14px,3vw,16px);line-height:1.7;font-weight:500}

    .opts{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
    .opt{width:100%;display:flex;align-items:flex-start;gap:13px;padding:13px 16px;
          background:var(--sur);border:1.5px solid var(--bdr);border-radius:12px;
          cursor:pointer;text-align:left;font-family:inherit;font-size:14px;
          color:var(--txt);transition:all .18s;line-height:1.5}
    .opt:hover:not(:disabled){border-color:var(--acc);background:rgba(59,130,246,.08);transform:translateX(3px)}
    .opt:disabled{cursor:default;transform:none!important}
    .oletter{min-width:28px;height:28px;background:var(--sur2);border-radius:7px;
              display:flex;align-items:center;justify-content:center;
              font-weight:700;font-size:12px;color:var(--muted);transition:all .18s;flex-shrink:0}
    .opt.sel .oletter{background:var(--acc);color:#fff}
    .opt.ok{border-color:var(--ok);background:rgba(34,197,94,.1)}
    .opt.ok .oletter{background:var(--ok);color:#fff}
    .opt.bad{border-color:var(--err);background:rgba(239,68,68,.08)}
    .opt.bad .oletter{background:var(--err);color:#fff}

    .fb{display:none;padding:13px 16px;border-radius:11px;font-size:13.5px;margin-bottom:14px;line-height:1.5}
    .fb.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#4ade80}
    .fb.bad{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#f87171}

    /* ── Action row (prev + next buttons) ── */
    #action-row{
      display:none;          /* hidden until render sets it up */
      gap:10px;
      flex-direction:column; /* stacked = full-width each */
    }
    #action-row.show{ display:flex; }
    #action-row.side-by-side{ flex-direction:row; }

    /* "Xem câu vừa làm" button  — secondary style */
    #btn-prev{
      flex:1;padding:14px;
      background:var(--sur);color:var(--txt);
      border:1.5px solid var(--bdr);border-radius:11px;
      font-family:inherit;font-size:14px;font-weight:600;
      cursor:pointer;transition:all .18s;
      display:flex;align-items:center;justify-content:center;gap:6px;
    }
    #btn-prev:hover{border-color:var(--acc);color:var(--acc);background:rgba(59,130,246,.06)}

    /* "Câu tiếp theo" button — primary blue */
    #btn-next{
      flex:1;padding:14px;
      background:var(--acc);color:#fff;
      border:none;border-radius:11px;
      font-family:inherit;font-size:14px;font-weight:600;
      cursor:pointer;transition:all .18s;
    }
    #btn-next:hover{background:var(--acc2)}

    /* ────── REVIEW PANEL ────── */
    #review-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;backdrop-filter:blur(3px)}
    #review-panel{
      position:fixed;top:0;right:0;bottom:0;width:min(420px,100vw);
      background:var(--sur);border-left:1px solid var(--bdr);
      display:none;flex-direction:column;z-index:101;
      animation:slideR .25s ease;
    }
    @keyframes slideR{from{transform:translateX(100%)}to{transform:translateX(0)}}
    .rp-head{padding:18px 20px;border-bottom:1px solid var(--bdr);
              display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .rp-head h2{font-size:16px;font-weight:700}
    .rp-head .stats{font-size:12px;color:var(--muted);margin-top:2px}
    .rp-close{background:var(--sur2);border:1px solid var(--bdr);color:var(--muted);
               width:32px;height:32px;border-radius:8px;font-size:16px;
               cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s}
    .rp-close:hover{color:var(--txt);border-color:#475569}
    .rp-tabs{display:flex;border-bottom:1px solid var(--bdr);flex-shrink:0}
    .rp-tab{flex:1;padding:10px 8px;font-size:12px;font-weight:600;text-align:center;
             cursor:pointer;border:none;background:transparent;color:var(--muted);
             font-family:inherit;transition:all .18s;border-bottom:2px solid transparent}
    .rp-tab.on{color:var(--acc);border-bottom-color:var(--acc);background:rgba(59,130,246,.05)}
    .rp-tab:hover:not(.on){color:var(--txt)}
    .rp-body{flex:1;overflow-y:auto;padding:14px}
    .rp-body::-webkit-scrollbar{width:5px}
    .rp-body::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:99px}
    .rp-item{background:var(--bg);border:1px solid var(--bdr);border-radius:12px;
              padding:13px 14px;margin-bottom:10px;cursor:pointer;transition:all .18s}
    .rp-item:hover{border-color:#475569;transform:translateX(-2px)}
    .rp-item.is-ok{border-left:3px solid var(--ok)}
    .rp-item.is-bad{border-left:3px solid var(--err)}
    .rp-item-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
    .rp-item-num{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
    .rp-item-icon{font-size:14px;flex-shrink:0}
    .rp-item-q{font-size:13px;color:var(--txt);line-height:1.5;margin-bottom:8px}
    .rp-item-ans{display:flex;gap:8px;flex-wrap:wrap}
    .rp-ans-tag{font-size:11.5px;padding:3px 9px;border-radius:6px}
    .rp-ans-tag.ok-tag{background:rgba(34,197,94,.15);color:#4ade80}
    .rp-ans-tag.bad-tag{background:rgba(239,68,68,.13);color:#f87171}
    .rp-ans-tag.cor-tag{background:rgba(34,197,94,.15);color:#4ade80}

    /* ────── DETAIL MODAL ────── */
    #detail-modal{display:none;position:fixed;inset:0;z-index:200;
                   align-items:center;justify-content:center;padding:20px;
                   background:rgba(0,0,0,.65);backdrop-filter:blur(4px)}
    #detail-modal.open{display:flex}
    .dm-card{background:var(--sur);border:1px solid var(--bdr);border-radius:18px;
              max-width:560px;width:100%;max-height:85vh;overflow-y:auto;animation:fadeUp .2s ease}
    .dm-head{padding:20px 22px 0;display:flex;justify-content:space-between;align-items:flex-start}
    .dm-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;
               text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
    .dm-badge.ok-badge{background:rgba(34,197,94,.18);color:#4ade80}
    .dm-badge.bad-badge{background:rgba(239,68,68,.18);color:#f87171}
    .dm-num{font-size:11px;color:var(--acc);font-weight:700;text-transform:uppercase;letter-spacing:.7px}
    .dm-close{background:var(--sur2);border:1px solid var(--bdr);color:var(--muted);
               width:30px;height:30px;border-radius:7px;font-size:15px;
               cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .dm-close:hover{color:var(--txt)}
    .dm-q{padding:12px 22px 16px;font-size:15px;font-weight:500;line-height:1.7;color:var(--txt)}
    .dm-opts{padding:0 16px 20px;display:flex;flex-direction:column;gap:8px}
    .dm-opt{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;
             border-radius:11px;border:1.5px solid var(--bdr);font-size:13.5px;line-height:1.5}
    .dm-opt.dm-ok{border-color:var(--ok);background:rgba(34,197,94,.09)}
    .dm-opt.dm-bad{border-color:var(--err);background:rgba(239,68,68,.08)}
    .dm-opt.dm-neutral{background:var(--bg)}
    .dm-letter{min-width:26px;height:26px;border-radius:6px;display:flex;align-items:center;
                justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
    .dm-ok .dm-letter{background:var(--ok);color:#fff}
    .dm-bad .dm-letter{background:var(--err);color:#fff}
    .dm-neutral .dm-letter{background:var(--sur2);color:var(--muted)}
    .dm-tag{margin-left:auto;font-size:10px;padding:2px 7px;border-radius:99px;flex-shrink:0;align-self:center}
    .dm-tag.t-ok{background:rgba(34,197,94,.2);color:#4ade80}
    .dm-tag.t-bad{background:rgba(239,68,68,.2);color:#f87171}

    /* ────── RESULT ────── */
    #s-result{max-width:620px}
    .rhdr{text-align:center;margin-bottom:24px}
    .remoji{font-size:56px;margin-bottom:14px}
    .rhdr h2{font-size:24px;font-weight:700;margin-bottom:6px}
    .rhdr p{color:var(--muted);font-size:14px}
    .ring-wrap{display:flex;justify-content:center;margin-bottom:24px}
    .ring{position:relative;width:130px;height:130px}
    .ring svg{transform:rotate(-90deg)}
    .ring-bg{fill:none;stroke:var(--sur2);stroke-width:10}
    .ring-fill{fill:none;stroke:var(--acc);stroke-width:10;stroke-linecap:round;
                stroke-dasharray:345;stroke-dashoffset:345;transition:stroke-dashoffset 1s ease}
    .ring-txt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
    .ring-txt .pct{font-size:26px;font-weight:700;color:var(--acc)}
    .ring-txt .lbl{font-size:10px;color:var(--muted)}
    .rstats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
    .rstat{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 10px;text-align:center}
    .rstat .v{font-size:22px;font-weight:700}
    .rstat .l{font-size:11px;color:var(--muted);margin-top:3px}
    .vg{color:var(--ok)} .vr{color:var(--err)}
    .racts{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
    .rbtn{flex:1;min-width:130px;padding:13px;border-radius:11px;font-family:inherit;
           font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .18s}
    .rbtn.p{background:var(--acc);color:#fff} .rbtn.p:hover{background:var(--acc2)}
    .rbtn.s{background:var(--sur);color:var(--txt);border:1px solid var(--bdr)}
    .rbtn.s:hover{border-color:#475569}
    .rbtn.rv{background:var(--sur2);color:var(--txt);border:1px solid var(--bdr)}
    .rbtn.rv:hover{border-color:var(--acc);color:var(--acc)}

    @media(max-width:480px){
      .cards{grid-template-columns:repeat(2,1fr)}
      .racts{flex-direction:column}
      .hbtn span.lbl{display:none}
    }

    /* Special question types */
    .type-badge{display:inline-block;padding:4px 11px;border-radius:7px;font-size:11px;
                font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
    .tb-fill{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
    .tb-arr{background:rgba(34,197,94,.15);color:#34d399;border:1px solid rgba(34,197,94,.3)}
    .blank-sp{
      display:inline-block;min-width:120px;max-width:210px;
      padding:3px 8px;background:rgba(59,130,246,.1);border:none;
      border-bottom:2.5px solid var(--acc);
      color:var(--acc);font-family:inherit;font-size:inherit;font-weight:700;
      text-align:center;outline:none;transition:all .2s;
      vertical-align:baseline;border-radius:4px 4px 0 0;
    }
    .blank-sp:focus{background:rgba(59,130,246,.17)}
    .blank-sp:disabled{color:var(--muted);border-bottom-color:var(--bdr)}
    .wzone-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;
               letter-spacing:.5px;margin-bottom:7px}
    .wzone{display:flex;flex-wrap:wrap;gap:8px;min-height:52px;
           padding:10px;border-radius:12px;align-content:flex-start;margin-bottom:12px}
    .wzone-target{background:rgba(59,130,246,.06);border:1.5px solid rgba(59,130,246,.25)}
    .wzone-target.has-chip{border-color:var(--acc)}
    .wzone-source{background:var(--sur2);border:1px solid var(--bdr)}
    .wchip{padding:9px 14px;background:#334155;border:1px solid #475569;
           border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;
           user-select:none;transition:all .15s;color:var(--txt)}
    .wchip:hover:not(.dis){background:#475569;transform:translateY(-1px)}
    .wchip.dis{pointer-events:none;opacity:.55}
    .sp-submit{width:100%;padding:14px;background:var(--acc);color:#fff;font-family:inherit;
               font-size:15px;font-weight:600;border:none;border-radius:var(--r);cursor:pointer;
               transition:all .18s;margin-top:4px}
    .sp-submit:hover{background:var(--acc2)}
    .sp-submit:disabled{opacity:.5;cursor:default}
  </style>
</head>
<body>

<!-- ══ START ══ -->
<div id="s-start" class="screen active">
  <div class="logo">✝️</div>
  <h1>Trắc nghiệm<br>Tin Mừng Mát-thêu</h1>
  <p class="sub">422 câu hỏi &nbsp;•&nbsp; Trộn đề mỗi lần thi</p>
  <div class="cards">
    <div class="card"><div class="n">422</div><div class="l">Câu hỏi</div></div>
    <div class="card"><div class="n">28</div><div class="l">Chương</div></div>
    <div class="card"><div class="n" id="st-n">50</div><div class="l">Câu / lần thi</div></div>
  </div>
  <div class="sec">
    <h3>🎯 Số câu mỗi lần làm</h3>
    <div class="pills" id="cnt-pills">
      <button class="pill" data-v="20">20 câu</button>
      <button class="pill on" data-v="50">50 câu</button>
      <button class="pill" data-v="100">100 câu</button>
      <button class="pill" data-v="all">Tất cả</button>
    </div>
  </div>
  <div class="sec">
    <h3>🔀 Trộn thứ tự đáp án</h3>
    <div class="pills" id="shuf-pills">
      <button class="pill on" data-v="1">Có trộn</button>
      <button class="pill" data-v="0">Giữ nguyên</button>
    </div>
  </div>
  <button class="btn-main" onclick="startQuiz()">▶ Bắt đầu làm bài</button>
</div>

<!-- ══ QUIZ ══ -->
<div id="s-quiz" class="screen">
  <div class="qhdr">
    <div class="pinfo">
      <div class="plabel">
        <span id="p-txt">Câu 1 / 50</span>
        <span id="sc-txt">✓ 0 &nbsp;✗ 0</span>
      </div>
      <div class="pbar"><div class="pfill" id="p-fill" style="width:0%"></div></div>
    </div>
    <div class="hdr-btns">
      <button class="hbtn" onclick="openReview()" title="Xem lại toàn bộ">
        📋 <span class="lbl">Xem lại toàn bộ</span> <span class="badge" id="review-badge">0</span>
      </button>
      <button class="hbtn" onclick="confirmQuit()" title="Thoát">⏹ <span class="lbl">Thoát</span></button>
    </div>
  </div>

  <div class="qcard">
    <div class="qnum" id="q-num">Câu 1</div>
    <div id="sp-type-badge"></div>
    <div class="qtxt" id="q-txt"></div>
  </div>
  <div class="opts" id="opts"></div>
  <div id="sp-fill-area" style="display:none">
    <button class="sp-submit" id="sp-fill-btn" onclick="submitFill()">✔ Kiểm tra đáp án</button>
  </div>
  <div id="sp-arr-area" style="display:none">
    <div class="wzone-lbl">Câu trả lời của bạn:</div>
    <div class="wzone wzone-target" id="sp-target"></div>
    <div class="wzone-lbl">Bấm vào từ để ghép:</div>
    <div class="wzone wzone-source" id="sp-source"></div>
    <button class="sp-submit" id="sp-arr-btn" onclick="submitArrange()">✔ Kiểm tra đáp án</button>
  </div>
  <div class="fb" id="fb"></div>

  <!--
    ACTION ROW:
    • Chưa trả lời + có lịch sử  → chỉ btn-prev, full-width (column)
    • Chưa trả lời + chưa có lịch sử → ẩn hết
    • Đã trả lời → cả hai nằm cạnh nhau (row, side-by-side)
  -->
  <div id="action-row">
    <button id="btn-prev" onclick="reviewLast()">
      ← Xem câu vừa làm
    </button>
    <button id="btn-next" onclick="next()">Câu tiếp theo →</button>
  </div>
</div>

<!-- ══ RESULT ══ -->
<div id="s-result" class="screen">
  <div class="rhdr">
    <div class="remoji" id="r-emoji">🏆</div>
    <h2 id="r-title">Hoàn thành!</h2>
    <p id="r-sub"></p>
  </div>
  <div class="ring-wrap">
    <div class="ring">
      <svg width="130" height="130" viewBox="0 0 130 130">
        <circle class="ring-bg" cx="65" cy="65" r="55"/>
        <circle class="ring-fill" id="r-ring" cx="65" cy="65" r="55"/>
      </svg>
      <div class="ring-txt"><span class="pct" id="r-pct">0%</span><span class="lbl">điểm</span></div>
    </div>
  </div>
  <div class="rstats">
    <div class="rstat"><div class="v vg" id="r-ok">0</div><div class="l">✅ Đúng</div></div>
    <div class="rstat"><div class="v vr" id="r-err">0</div><div class="l">❌ Sai</div></div>
    <div class="rstat"><div class="v" id="r-tot">0</div><div class="l">📝 Tổng câu</div></div>
  </div>
  <div class="racts">
    <button class="rbtn p" onclick="restartQuiz()">🔄 Làm lại</button>

t 6,19-20)", "opts": [{"letter": "A", "text": "Dành cho người được Thiên Chúa yêu thương,", "correct": false}, {"letter": "B", "text": "Mối mọt không làm hư nát", "correct": false}, {"letter": "C", "text": "Kẻ trộm không khoét vách lấy đi", "correct": false}, {"letter": "D", "text": "Chỉ có b và c đúng", "correct": true}]}, {"id": 98, "q": "Hãy hoàn thành câu : “Kho tàng của anh ở đâu, ... ... ... .” (Mt 6,21)", "opts": [{"letter": "A", "text": "Thì lòng anh ở đó", "correct": true}, {"letter": "B", "text": "Thì hồn anh ở đó", "correct": false}, {"letter": "C", "text": "Thì diều hâu ở đó", "correct": false}, {"letter": "D", "text": "Thì lòng trí anh ở đó", "correct": false}]}, {"id": 99, "q": "Đèn của thân thể là gì? (Mt 6,22)", "opts": [{"letter": "A", "text": "Thân xác", "correct": false}, {"letter": "B", "text": "Linh hồn", "correct": false}, {"letter": "C", "text": "Con mắt", "correct": true}, {"letter": "D", "text": "Con ngươi", "correct": false}]}, {"id": 100, "q": "Đèn của thân thể là con mắt. Vậy nếu mắt anh sáng, thì thế nào? (Mt 6,22)", "opts": [{"letter": "A", "text": "Toàn thân anh sẽ sung sướng", "correct": false}, {"letter": "B", "text": "Toàn thân anh sẽ được vinh hạnh", "correct": false}, {"letter": "C", "text": "Toàn thân anh sẽ sáng", "correct": true}, {"letter": "D", "text": "Anh sẽ được hạnh phúc", "correct": false}]}, {"id": 101, "q": "Đèn của thân thể là con mắt. Còn nếu mắt anh xấu, thì thế nào?(Mt 6,22a-23)", "opts": [{"letter": "A", "text": "Con người anh sẽ tối tăm", "correct": false}, {"letter": "B", "text": "Toàn thân anh sẽ bị ném vào hỏa ngục", "correct": false}, {"letter": "C", "text": "Toàn thân anh sẽ tối", "correct": true}, {"letter": "D", "text": "Mọi hành động của anh sẽ xấu xa", "correct": false}]}, {"id": 102, "q": "Hãy hoàn thành câu : “Không ai có thể làm tôi hai chủ, vì hoặc sẽ ghét chủ này mà yêu chủ kia, hoặc sẽ gắn bó với chủ này mà khinh dể chủ nọ. Anh em không thể vừa làm tôi Thiên Chúa vừa làm tôi ... ... ... .” (Mt 6,24)", "opts": [{"letter": "A", "text": "Ma Quỷ được", "correct": false}, {"letter": "B", "text": "Tiền Của được", "correct": true}, {"letter": "C", "text": "Dục vọng được", "correct": false}, {"letter": "D", "text": "Quyền thế được", "correct": false}]}, {"id": 103, "q": "Con gì chúng không gieo, không gặt, không thu tích vào kho; thế mà Cha anh em trên trời vẫn nuôi chúng? (Mt 6,26)", "opts": [{"letter": "A", "text": "Con chồn", "correct": false}, {"letter": "B", "text": "Con cáo", "correct": false}, {"letter": "C", "text": "Chim trời", "correct": true}, {"letter": "D", "text": "Con cá", "correct": false}]}, {"id": 104, "q": "Chúa Giêsu nhắc tới hoa gì ngoài đồng? (Mt 6,28)", "opts": [{"letter": "A", "text": "Hoa cải", "correct": false}, {"letter": "B", "text": "Hoa ly", "correct": false}, {"letter": "C", "text": "Hoa huệ", "correct": true}, {"letter": "D", "text": "Hoa thiên tuế", "correct": false}]}, {"id": 105, "q": "Chúa Giêsu nhắc tới vua nào, dù vinh quang tột bậc, cũng không mặc đẹp bằng hoa huệ ngoài đồng? (Mt 6,29)", "opts": [{"letter": "A", "text": "Vua Hêrôđê", "correct": false}, {"letter": "B", "text": "Vua Đavít", "correct": false}, {"letter": "C", "text": "Vua Salômôn", "correct": true}, {"letter": "D", "text": "Vua Saun", "correct": false}]}, {"id": 106, "q": "Hãy hoàn thành câu : “Anh em đừng lo lắng về ngày mai: ngày mai, cứ để ngày mai lo. ... ... ... .” (Mt 6,34)", "opts": [{"letter": "A", "text": "Ngày nào có niềm vui của ngày ấy", "correct": false}, {"letter": "B", "text": "Ngày nào có bổn phận của ngày ấy", "correct": false}, {"letter": "C", "text": "Ngày nào có nhiệm vụ của ngày ấy", "correct": false}, {"letter": "D", "text": "Ngày nào có cái khổ của ngày ấy", "correct": true}]}, {"id": 107, "q": "Hãy hoàn thành câu : “Anh em đừng xét đoán, để ... ... ... .” (Mt 7,1)", "opts": [{"letter": "A", "text": "Khỏi bị đoán phạt", "correct": false}, {"letter": "B", "text": "Khỏi bị ném vào hỏa ngục", "correct": false}, {"letter": "C", "text": "Khỏi bị T  "correct": false}, {"letter": "D", "text": "Luật Môsê và lời các ngôn sứ là thế đó", "correct": true}]}, {"id": 118, "q": "Hãy qua cửa hẹp mà vào, vì cửa rộng và đường thênh thang thì đưa đến đâu? (Mt 7,13)", "opts": [{"letter": "A", "text": "Sung sướng", "correct": false}, {"letter": "B", "text": "Diệt vong", "correct": true}, {"letter": "C", "text": "Cái chết", "correct": false}, {"letter": "D", "text": "Hạnh phúc", "correct": false}]}, {"id": 119, "q": "Hãy hoàn thành câu : “Hãy qua cửa hẹp mà vào, vì cửa rộng và đường thênh thang thì đưa đến diệt vong, mà nhiều người lại đi qua đó. Còn cửa hẹp và đường chật thì đưa đến sự sống, nhưng ... ... ... .” (Mt 7,13-14)", "opts": [{"letter": "A", "text": "Dành cho những người yêu mến Thiên Chúa", "correct": false}, {"letter": "B", "text": "Dành cho những ai tuân giữ luật Chúa", "correct": false}, {"letter": "C", "text": "Và hạnh phúc Nước Trời", "correct": false}, {"letter": "D", "text": "Ít người tìm được lối ấy", "correct": true}]}, {"id": 120, "q": "Anh em hãy coi chừng ai, họ đội lốt chiên mà đến với anh em; nhưng bên trong, họ là sói dữ tham mồi? (Mt 7,15)", "opts": [{"letter": "A", "text": "Bọn đạo đức giả", "correct": false}, {"letter": "B", "text": "Các mục tử giả", "correct": false}, {"letter": "C", "text": "Các ngôn sứ giả", "correct": true}, {"letter": "D", "text": "Các kinh sư và biệt phái", "correct": false}]}, {"id": 121, "q": "Cứ xem họ sinh hoa quả nào, thì biết họ là ai. Ở bụi gai, làm gì có quả gì mà hái? (Mt 7,16)", "opts": [{"letter": "A", "text": "Quả lê", "correct": false}, {"letter": "B", "text": "Quả nho", "correct": true}, {"letter": "C", "text": "Quả lựu", "correct": false}, {"letter": "D", "text": "Quả vả", "correct": false}]}, {"id": 122, "q": "Cứ xem họ sinh hoa quả nào, thì biết họ là ai. ...  Trên cây găng, làm gì có quả gì mà bẻ? (Mt 7,16)", "opts": [{"letter": "A", "text": "Quả lê", "correct": false}, {"letter": "B", "text": "Quả nho", "correct": false}, {"letter": "C", "text": "Quả lựu", "correct": false}, {"letter": "D", "text": "Quả vả", "correct": true}]}, {"id": 123, "q": "Cây tốt không thể sinh quả xấu, cũng như cây xấu không thể sinh quả tốt. Cây nào không sinh quả tốt, thì bị gì?(Mt 7,18-19)", "opts": [{"letter": "A", "text": "Cắt tỉa cành", "correct": false}, {"letter": "B", "text": "Chặt đi", "correct": false}, {"letter": "C", "text": "Quăng vào lửa", "correct": false}, {"letter": "D", "text": "Chỉ có b và c đúng", "correct": true}]}, {"id": 124, "q": "Những ai thi hành ý muốn của Cha Thầy là Đấng ngự trên trời, mới được vào đâu mà thôi? (Mt 7,21)", "opts": [{"letter": "A", "text": "Đất Hứa", "correct": false}, {"letter": "B", "text": "Nước Trời", "correct": true}, {"letter": "C", "text": "Hỏa Ngục", "correct": false}, {"letter": "D", "text": "Giáo Hội của Chúa Giêsu", "correct": false}]}, {"id": 125, "q": "Ai nghe những lời Thầy nói đây mà đem ra thực hành, thì ví được như người khôn làm gì? (Mt 7,24)", "opts": [{"letter": "A", "text": "Tích trử của cải trên trời", "correct": false}, {"letter": "B", "text": "Lấy cái tốt từ kho tàng của mình mà sống", "correct": false}, {"letter": "C", "text": "Xây nhà trên đá", "correct": true}, {"letter": "D", "text": "Chăm chỉ thực hành Lời Chúa dạy", "correct": false}]}, {"id": 126, "q": "Vậy ai nghe những lời Thầy nói đây mà đem ra thực hành, thì ví được như người khôn xây nhà trên đá. Dù điều gì ập vào nhà ấy cũng không sụp đổ, vì đã xây trên nền đá? (Mt 7,24-25)", "opts": [{"letter": "A", "text": "Mưa sa", "correct": false}, {"letter": "B", "text": "Nước cuốn", "correct": false}, {"letter": "C", "text": "Bão táp", "correct": false}, {"letter": "D", "text": "Cả a, b và c đúng", "correct": true}]}, {"id": 127, "q": "Còn ai nghe những lời Thầy nói đây, mà chẳng đem ra thực hành, thì ví được như người ngu dại xây nhà ở đâu? (Mt 7,26)", "opts": [{"letter": "A", "text": "Bên bờ suối", "correct": false}, {"letter": "B", "text": "Trên cát", "correct": true}, {"letter": "C", "text": "Trên ruộng đồng", "correct": false}, {"letter": "D", "text": "Bên sông", "correct": false}]}, {"id": 128, "q": "Còn ai nghe những lời Thầy nói đây, mà chẳng đem ra thực hành, thì ví được như người ngu dại xây nhà trên cát. Gặp điều gì ập vào, nhà ấy sẽ sụp đổ, sụp đổ tan tành? (Mt 7,26-27)", "opts": [{"letter": "A", "text": "Mưa sa", "correct": false}, {"letter": "B", "text": "Nước cuốn", "correct": false}, {"letter": "C", "text": "Bão táp", "correct": false}, {"letter": "D", "text": "Cả a, b và c đúng", "correct": true}]}, {"id": 129, "q": "“Thưa Ngài, nếu Ngài muốn, Ngài có thể làm cho tôi được sạch.” Đây là lời của ai? (Mt 8,2)", "opts": [{"letter": "A", "text": "Người bệnh băng huyết", "correct": false}, {"letter": "B", "text": "Người quỉ ám", "correct": false}, {"letter": "C", "text": "Người phong hủi", "correct": true}, {"letter": "D", "text": "Người bại liệt", "correct": false}]}, {"id": 130, "q": "Sau khi được khỏi bệnh, người phong hủi phải đi trình diện với ai và dâng của lễ để làm chứng cho người ta biết? (Mt 8,3-4)", "opts": [{"letter": "A", "text": "Thượng tế", "correct": false}, {"letter": "B", "text": "Tư tế", "correct": true}, {"letter": "C", "text": "Trưởng hội đường", "correct": false}, {"letter": "D", "text": "Thầy Lêvi", "correct": false}]}, {"id": 131, "q": "Chúa Giêsu chữa cho tên đầy tớ viên đại đội trưởng tại thành nào? (Mt 8,5)", "opts": [{"letter": "A", "text": "Thành Giêrusalem", "correct": false}, {"letter": "B", "text": "Thành Nadarét", "correct": false}, {"letter": "C", "text": "Thành Caphácnaum", "correct": true}, {"letter": "D", "text": "Thành Samaria", "correct": false}]}, {"id": 132, "q": "Người đầy tớ, viên đại đội trưởng tại thành Caphácnaum được Chúa Giêsu cứu chữa, bị gì? (Mt 8,6)", "opts": [{"letter": "A", "text": "Bị sốt", "correct": false}, {"letter": "B", "text": "Bị bệnh hủi", "correct": false}, {"letter": "C", "text": "Bị quỷ ám", "correct": false}, {"letter": "D", "text": "Bị tê bại nằm liệt", "correct": true}]}, {"id": 133, "q": "Từ phương đông phương tây, nhiều người sẽ đến dự tiệc cùng các tổ phụ nào trong Nước Trời? (Mt 8,11)", "opts": [{"letter": "A", "text": "Tổ phụ Giacóp", "correct": false}, {"letter": "B", "text": "Tổ phụ Ixaác", "correct": false}, {"letter": "C", "text": "Tổ phụ Ápraham", "correct": false}, {"letter": "D", "text": "Cả a, b và c đúng", "correct": true}]}, {"id": 134, "q": "Từ phương đông phương tây, nhiều người sẽ đến dự tiệc cùng các tổ phụ Ápraham, Ixaác và Giacóp trong Nước Trời. Nhưng con cái Nước Trời thì sẽ bị quăng ra chỗ tối tăm bên ngoài, ở đó người ta sẽ thế nào? (Mt 8,11-12)", "opts": [{"letter": "A", "text": "Âu sầu đau khổ", "correct": false}, {"letter": "B", "text": "Bị lửa hỏa ngục thiêu đốt", "correct": false}, {"letter": "C", "text": "Phải khóc lóc nghiến răng", "correct": true}, {"letter": "D", "text": "Bị người đời nguyền rủa", "correct": false}]}, {"id": 135, "q": "“Ông cứ về đi! Ông tin thế nào thì được như vậy!” Lời Chúa Giêsu nói với ai? (Mt 8,13)", "opts": [{"letter": "A", "text": "Ông trưởng hội đường", "correct": true}, {"letter": "B", "text": "Ông Giai-ia", "correct": false}, {"letter": "C", "text": "Viên đại đội trưởng", "correct": false}, {"letter": "D", "text": "Cha đứa bé bị kinh phong", "correct": false}]}, {"id": 136, "q": "Chúa Giêsu chữa bà mẹ vợ của ai đang nằm liệt và bị sốt? (Mt 8,14)", "opts": [{"letter": "A", "text": "Ông Anphê", "correct": false}, {"letter": "B", "text": "Ông Lêvi", "correct": false}, {"letter": "C", "text": "Ông Phêrô", "correct": true}, {"letter": "D", "text": "Ông Anrê", "correct": false}]}, {"id": 137, "q": "“Người đã mang lấy các tật nguyền của ta và gánh lấy các bệnh hoạn của ta.” Lời này từ ngôn sứ nào? (Mt 8,17)", "opts": [{"letter": "A", "text": "Ngôn sứ Êlia", "correct": false}, {"letter": "B", "text": "Ngôn sứ Mikha", "correct": false}, {"letter": "C", "text": "Ngôn sứ Isaia", "correct": true}, {"letter": "D", "text": "Ngôn sứ Giôna", "correct": false}]}, {"id": 138, "q": "“Thưa Thầy, Thầy đi đâu, tôi cũng xin đi theo.” Đây là lời của ai nói với Chúa Giêsu? (Mt 8,19)", "opts": [{"letter": "A", "text": "Thầy Lêvi", "correct": false}, {"letter": "B", "text": "một Kinh sư", "correct": true}, {"letter": "C", "text": "Người Pharisêu", "correct": false}, {"letter": "D", "text": "Người Xađốc", "correct": false}]}, {"id": 139, "q": "Con chồn có hang, chim trời có tổ, nhưng ai không có chỗ tựa đầu?(Mt 8,20)", "opts": [{"letter": "A", "text": "Các môn đệ", "correct": false}, {"letter": "B", "text": "Người nghèo", "correct": false}, {"letter": "C", "text": "Con Người", "correct": true}, {"letter": "D", "text": "Đấng cứu thế", "correct": false}]}, {"id": 140, "q": "Một môn đệ khác thưa với Người: ‘Thưa Ngài, xin cho phép con về chôn cất cha con trước đã.” Đức Giêsu bảo thế nào? (Mt 8,21-22)", "opts": [{"letter": "A", "text": "Người khác sẽ chôn cất cha anh", "correct": false}, {"letter": "B", "text": "Tin Mừng phải được cấp bách rao giảng", "correct": false}, {"letter": "C", "text": ": Anh hãy đi theo tôi, cứ để kẻ chết chôn kẻ chết của họ", "correct": true}, {"letter": "D", "text": "Nước Thiên Chúa phải ưu tiên trên hết", "correct": false}]}, {"id": 141, "q": "“Thưa Ngài, xin cứu chúng con, chúng con chết mất!” Lời các môn đệ kêu xin với Chúa Giêsu khi nào? (Mt 8,24-25)", "opts": [{"letter": "A", "text": "Khi băng qua miền Samaria", "correct": false}, {"letter": "B", "text": "Khi biển động mạnh khiến sóng ập vào thuyền", "correct": true}, {"letter": "C", "text": "Đối diện với binh lính trong vườn Cây Dầu", "correct": false}, {"letter": "D", "text": "Khi bị người Pharisêu chất vấn", "correct": false}]}, {"id": 142, "q": "Tại miền nào, có hai người bị quỷ ám từ trong đám mồ mả ra đón Chúa Giêsu? (Mt 8,28)", "opts": [{"letter": "A", "text": "Miền Samari", "correct": false}, {"letter": "B", "text": "Miền Gađara", "correct": true}, {"letter": "C", "text": "Miền Giuđê", "correct": false}, {"letter": "D", "text": "Miền Galilê", "correct": false}]}, {"id": 143, "q": "Người bị quỷ ám gọi Chúa ct": false}, {"letter": "B", "text": "Ông Mátthêu", "correct": true}, {"letter": "C", "text": "Ông Gia-kêu", "correct": false}, {"letter": "D", "text": "Ông Ladazô", "correct": false}]}, {"id": 149, "q": "Ai đã nói với các môn đệ “Sao Thầy các anh lại ăn uống với bọn thu thuế, và quân tội lỗi như vậy?”? (Mt 9,11)", "opts": [{"letter": "A", "text": "Người Pharisêu", "correct": true}, {"letter": "B", "text": "Dân chúng", "correct": false}, {"letter": "C", "text": "Các thượng tế", "correct": false}, {"letter": "D", "text": "Nhóm Hê-rô-đê", "correct": false}]}, {"id": 150, "q": "Hãy hoàn thành câu : “Người khoẻ mạnh không cần thầy thuốc, ... ... ... .” (Mt 9,12)", "opts": [{"letter": "A", "text": "Người tội lỗi mới cần", "correct": false}, {"letter": "B", "text": "Người chưa được đón nhận Tin Mừng Cứu Độ", "correct": false}, {"letter": "C", "text": "Người đau ốm mới cần", "correct": true}, {"letter": "D", "text": "Hết tất cả mọi người đều cần", "correct": false}]}, {"id": 151, "q": "Hãy hoàn thành câu : Hãy về học cho biết ý nghĩa của câu này: “Ta muốn lòng nhân chứ đâu cần lễ tế. Vì tôi không đến để kêu gọi người công chính,  ... ... ... .” (Mt 9,13)", "opts": [{"letter": "A", "text": "Để kêu gọi dân ngoại chưa biết Chúa", "correct": false}, {"letter": "B", "text": "Để kêu gọi người thánh thiện", "correct": false}, {"letter": "C", "text": "Mà để kêu gọi người tội lỗi", "correct": true}, {"letter": "D", "text": "Để kêu gọi hết tất cả mọi người", "correct": false}]}, {"id": 152, "q": "Các môn đệ của ai đến hỏi Chúa Giêsu: “Tại sao chúng tôi và các người Pharisêu ăn chay, mà môn đệ ông lại không ăn chay?”? (Mt 9,14)", "opts": [{"letter": "A", "text": "Môn đệ của Chúa Giêsu", "correct": false}, {"letter": "B", "text": "Các môn đệ của ông Gioan", "correct": true}, {"letter": "C", "text": "Môn đệ của nhóm Biệt Phái", "correct": false}, {"letter": "D", "text": "Môn đề của các thượng tế", "correct": false}]}, {"id": 153, "q": "Người ta cũng không đổ rượu mới vào bầu da cũ, vì t. Vậy anh em ... ... ... .” (Mt 9,38)", "opts": [{"letter": "A", "text": "Hãy xin chủ mùa gặt sai thợ ra gặt lúa về", "correct": true}, {"letter": "B", "text": "Hãy cầu nguyện cho có thêm nhiều tông đồ nhiệt thành", "correct": false}, {"letter": "C", "text": "Hãy xin Chúa Cha ban thêm thợ gặt", "correct": false}, {"letter": "D", "text": "Hãy xin Chúa Giêsu gửi các thiên thần đến gặt lúa về", "correct": false}]}, {"id": 159, "q": "Chúa Giêsu gọi mười hai môn đệ lại, để ban cho các ông quyền trên các thần ô uế, để các ông làm gì? (Mt 10,1)", "opts": [{"letter": "A", "text": "Ở với Chúa và để Chúa sai các ông đi rao giảng Tin Mừng", "correct": false}, {"letter": "B", "text": "Cùng với Chúa Giêsu đi loan báo Tin Mừng cứu độ", "correct": false}, {"letter": "C", "text": "Trừ các thần ô uế và chữa hết các bệnh hoạn tật nguyền", "correct": true}, {"letter": "D", "text": "Giảng dạy cho muôn dân và làm phép rửa cho mọi người", "correct": false}]}, {"id": 160, "q": "Đứng đầu danh sách mười hai Tông Đồ là ai? (Mt 10,2)", "opts": [{"letter": "A", "text": "Ông Simôn", "correct": true}, {"letter": "B", "text": "Ông Phao-lô", "correct": false}, {"letter": "C", "text": "Ông Giu-đa", "correct": false}, {"letter": "D", "text": "Ông Gioan", "correct": false}]}, {"id": 161, "q": "Ông Mátthêu làm nghề gì? (Mt 10,3)", "opts": [{"letter": "A", "text": "Trưởng Hội đường", "correct": false}, {"letter": "B", "text": "Nghề đánh cá", "correct": false}, {"letter": "C", "text": "Nghề thu thuế", "correct": true}, {"letter": "D", "text": "Nghề Chăn chiên", "correct": false}]}, {"id": 162, "q": "Ông Anphê là thân phụ của ai? (Mt 10,3)", "opts": [{"letter": "A", "text": "Ông Gioan", "correct": false}, {"letter": "B", "text": "Ông Giacôbê", "correct": true}, {"letter": "C", "text": "Ông An-rê", "correct": false}, {"letter": "D", "text": "Ông Philipphê", "correct": false}]}, {"id": 163, "q": "Ông Simôn thuộc nhóm nào? (Mt 10,4)", "opts": [{"letter": "A", "text": "Nhóm Quá Khích", "correct": true}, {"letter": "B", "text": "Nhóm biệt phái", "correct": false}, {"letter": "C", "text": "Nhóm Sa-đốc", "correct": false}, {"letter": "D", "text": "Nhóm dân ngoại", "correct": false}]}, {"id": 164, "q": "Chúa Giêsu sai mười hai ông ấy đi và chỉ thị rằng: Tốt hơn là hãy đến với các con chiên lạc nhà Ítraen. Dọc đường hãy rao giảng thế nào? (Mt 10,5-7)", "opts": [{"letter": "A", "text": "Nước Trời đã đến gần", "correct": true}, {"letter": "B", "text": "Hãy sám hối và tin vào Tin Mừng", "correct": false}, {"letter": "C", "text": "Hãy từ bỏ con đường tội lỗi", "correct": false}, {"letter": "D", "text": "Chúa Giêsu là Đấng Cứu Thế", "correct": false}]}, {"id": 165, "q": "Chúa Giêsu ban cho các môn đệ quyền gì khi sai các ông đi rao giảng?(Mt 10,1.8)", "opts": [{"letter": "A", "text": "Quyền ra lệch cho các quỷ thần và thiên nhiên. Làm các phép lạ để tôn vinh Thiên Chúa", "correct": false}, {"letter": "B", "text": "Quyền rao giảng và làm chứng cho Tin Mừng", "correct": false}, {"letter": "C", "text": "Chữa lành người đau yếu, làm cho kẻ chết sống lại, cho người phong hủi được sạch bệnh, và khử trừ ma quỷ", "correct": true}]}, {"id": 166, "q": "Đâu là chỉ thị đừng kiếm những gì khi đi rao giảng? (Mt 10,9)", "opts": [{"letter": "A", "text": "Đừng kiếm vàng bạc hay tiền giắt lưng", "correct": true}, {"letter": "B", "text": "Đừng kiếm danh vọng và địa vị", "correct": false}, {"letter": "C", "text": "Đừng kiếm chiên bò hay tiền lương", "correct": false}, {"letter": "D", "text": "Đừng kiếm những nhà giàu nơi tựa đầu", "correct": false}]}, {"id": 167, "q": "Đi đường đừng mang theo những thứ gì? (Mt 10,10)", "opts": [{"letter": "A", "text": "Đừng mang vợ con, cha mẹ hay người nhà", "correct": false}, {"letter": "B", "text": "Đừng mang theo bạn đồng hành", "correct": false}, {"letter": "C", "text": "Đừng mang bao bị, đừng mặc hai áo, đừng đi dép hay cầm gậy", "correct": true}, {"letter": "D", "text": "Được mang theo tiền bạc, quần áo và dép", "correct": false}]}, {"id": 168, "q": "Khi và hoát", "correct": true}]}, {"id": 173, "q": "Trò không hơn thầy, tớ không hơn chủ. Trò được như thầy, tớ được như chủ, đã là khá lắm rồi. Chủ nhà mà người ta còn gọi là gì, huống chi là người nhà? (Mt 10,24-25)", "opts": [{"letter": "A", "text": "Bêendêbun", "correct": true}, {"letter": "B", "text": "Tướng cướp", "correct": false}, {"letter": "C", "text": "Phường tội lỗi", "correct": false}, {"letter": "D", "text": "Tay ăn nhậu, bạn bè quân thu thuế", "correct": false}]}, {"id": 174, "q": "Anh em đừng sợ những kẻ giết thân xác mà không giết được linh hồn. Đúng hơn, anh em hãy sợ Đấng có thể tiêu diệt cả hồn lẫn xác trong đâu? (Mt 10,28)", "opts": [{"letter": "A", "text": "Trong âm phủ hay cõi âm ty", "correct": false}, {"letter": "B", "text": "Trong hoả ngục", "correct": true}, {"letter": "C", "text": "Trong Thiên đàng", "correct": false}, {"letter": "D", "text": "Trong vườn địa đàng", "correct": false}]}, {"id": 175, "q": "Hai con chim sẻ chỉ bán được bao nhiêu tiền? (Mt 10,29)", "opts": [{"letter": "A", "text": "Một hào", "correct": true}, {"letter": "B", "text": "Hai hào", "correct": false}, {"letter": "C", "text": "Ba  hào", "correct": false}, {"letter": "D", "text": "Năm hào", "correct": false}]}, {"id": 176, "q": "Những ai làm gì thì không xứng với Thầy? (Mt 10,37)", "opts": [{"letter": "A", "text": "Yêu bản thân và của cải vật chất hơn Thiên Chúa", "correct": false}, {"letter": "B", "text": "Yêu cha yêu mẹ, yêu con trai con gái hơn Thầy, thì không xứng với Thầy", "correct": true}, {"letter": "C", "text": "Từ bỏ kết những gì mình có, nhưng không vác thập giá mình", "correct": false}, {"letter": "D", "text": "Vác thập giá mình mỗi ngày", "correct": false}]}, {"id": 177, "q": "Ai không vác điều gì của mình mà theo Thầy, thì không xứng với Thầy? (Mt 10,38)", "opts": [{"letter": "A", "text": "Thập giá", "correct": true}, {"letter": "B", "text": "Vác tội lỗi", "correct": false}, {"letter": "C", "text": "Vác thập giá của người khác", "correct": false}, {"letter": "D", "text": "Vác gánh nặng cho nhau", "correct": false}]}, {"id": 178, "q": "Ai giữ lấy mạng sống mình, thì sẽ mất; còn ai liều mất mạng sống mình vì Thầy, thì thế nào? (Mt 10,39)", "opts": [{"letter": "A", "text": "Sẽ tìm thấy được", "correct": true}, {"letter": "B", "text": "Sẽ được Thiên Chúa ban thưởng Nước Trời", "correct": false}, {"letter": "C", "text": "Sẽ được sự sống đời đời", "correct": false}, {"letter": "D", "text": "Sẽ không phải chết, nhưng được sống muôn đời", "correct": false}]}, {"id": 179, "q": "Ai cho một trong những kẻ bé nhỏ này uống, dù chỉ một chén nước lã thôi, vì kẻ ấy là môn đệ của Thầy, thì Thầy bảo thật anh em, người đó sẽ không mất điều gì? (Mt 10,42)", "opts": [{"letter": "A", "text": "Không mất sự sống đời này", "correct": false}, {"letter": "B", "text": "Không mất hạnh phúc Nước Trời", "correct": false}, {"letter": "C", "text": "Không mất chính mình", "correct": false}, {"letter": "D", "text": "Không mất phần thưởng đâu", "correct": true}]}, {"id": 180, "q": "Ai đang ngồi tù, nghe biết những việc Đức Kitô làm, liền sai môn đệ đến hỏi Người rằng: “Thưa Thầy, Thầy có thật là Đấng phải đến không, hay là chúng tôi còn phải đợi ai khác?”? (Mt 11,2- 3)", "opts": [{"letter": "A", "text": "Ông Gioan. (Tẩy Giả)", "correct": true}, {"letter": "B", "text": "Ông Tôma", "correct": false}, {"letter": "C", "text": "Ông Philipphe", "correct": false}, {"letter": "D", "text": "Ông Phê-rô", "correct": false}]}, {"id": 181, "q": "Người mù xem thấy, kẻ què được đi, người cùi được sạch, kẻ điếc được nghe, người chết sống lại, kẻ nghèo được gì? (Mt 11,5)", "opts": [{"letter": "A", "text": "Đón nhận Tin Mừng", "correct": false}, {"letter": "B", "text": "Nghe Tin Mừng", "correct": true}, {"letter": "C", "text": "Nhận lương thực hàng ngày", "correct": false}, {"letter": "D", "text": "Được Thiên Chúa yêu thương", "correct": false}]}, {"id": 182, "q": "Ai là người Kinh Thánh đã nói tới khi chép rằng: Này Ta sai sứ giả của Ta đi trước mặt Con, người sẽ dọn đường ": "Đất Xơđôm", "correct": true}, {"letter": "B", "text": "Đất Gô-mô-ra", "correct": false}, {"letter": "C", "text": "Đất Dơ-vu-lun", "correct": false}, {"letter": "D", "text": "Đất Náp-ta-li", "correct": false}]}, {"id": 188, "q": "Hãy hoàn thành câu : “Lạy Cha là Chúa Tể trời đất, con xin ngợi khen Cha, vì Cha đã giấu không cho bậc khôn ngoan thông thái biết những điều này, nhưng lại mặc khải cho những người bé mọn. Vâng, lạy Cha, ... ... ... .” (Mt 11,25-26)", "opts": [{"letter": "A", "text": "Vì đó là điều đẹp ý Cha", "correct": true}, {"letter": "B", "text": "Vì đó là kế hoạch Cha dành cho họ", "correct": false}, {"letter": "C", "text": "Vì đó là mệnh lệnh Cha đã truyền", "correct": false}, {"letter": "D", "text": "Vì đó là điều con phải làm", "correct": false}]}, {"id": 189, "q": "Hãy hoàn thành câu : “Tất cả những ai đang vất vả mang gánh nặng nề, hãy đến cùng tôi, tôi sẽ ... ... ... .” (Mt 11,28)", "opts": [{"letter": "A", "text": "Cho vào hưởng Nước Trời", "correct": false}, {"letter": "B", "text": "Cho nghỉ ngơi bồi dưỡng", "correct": true}, {"letter": "C", "text": "Tôi sẽ thêm sức cho", "correct": false}, {"letter": "D", "text": "Tôi sẽ mang gánh nặng cho", "correct": false}]}, {"id": 190, "q": "Hãy hoàn thành câu : “Anh em hãy mang lấy ách của tôi, và hãy học với tôi, vì tôi ... ... ... .” (Mt 11,29)", "opts": [{"letter": "A", "text": "Có lòng hiền hậu và khiêm nhường", "correct": true}, {"letter": "B", "text": "Có trái tim mục tử tốt lành", "correct": false}, {"letter": "C", "text": "Yêu thương hết thảy mọi người", "correct": false}, {"letter": "D", "text": "Sẵn sàng chết cho người tội lỗi", "correct": false}]}, {"id": 191, "q": "Vào ngày nào, Đức Giêsu đi băng qua một cánh đồng lúa; các môn đệ thấy đói và bắt đầu bứt lúa ăn? (Mt 12,1)", "opts": [{"letter": "A", "text": "Vào ngày Lễ Vượt Qua", "correct": false}, {"letter": "B", "text": "Vào ngày Chúa Nhật", "correct": false}, {"letter": "C", "text": "Vào ngày sabát", "correct": true}, {"letter": "D", "text": "Vào ngày cuối tuần", "correct": false}]}, {"id": 192, "q": "Những người nào nói với Đức Giêsu: “Ông coi, các môn đệ ông làm điều không được phép làm ngày sa-bát!”? (Mt 12,2)", "opts": [{"letter": "A", "text": "Người Do-thái", "correct": false}, {"letter": "B", "text": "Người Samari", "correct": false}, {"letter": "C", "text": "Người nhà Đức Giêsu", "correct": false}, {"letter": "D", "text": "Người Pharisêu", "correct": true}]}, {"id": 193, "q": "Ai cùng thuộc hạ đói bụng, vào nhà Thiên Chúa, ăn bánh tiến. Thứ bánh này, họ không được phép ăn, chỉ có tư tế mới được ăn mà thôi? (Mt 12,3-4)", "opts": [{"letter": "A", "text": "Ông Đavít", "correct": true}, {"letter": "B", "text": "Ông Abraham", "correct": false}, {"letter": "C", "text": "Ông Nô-ê", "correct": false}, {"letter": "D", "text": "Ông Mô-sê", "correct": false}]}, {"id": 194, "q": "Khi chứng kiến việc Chúa Giêsu chữa người bị bại tay trong ngày sa-bát, ai bàn bạc để tìm cách giết Người? (Mt 12,9-14)", "opts": [{"letter": "A", "text": "Người Do Thái", "correct": false}, {"letter": "B", "text": "Các Thượng Tế", "correct": false}, {"letter": "C", "text": "Người Pharisêu", "correct": true}, {"letter": "D", "text": "Philato", "correct": false}]}, {"id": 195, "q": "“Đây là người Tôi Trung Ta đã tuyển chọn, đây là người Ta yêu dấu: Ta hài lòng về Người. Ta cho Thần Khí Ta ngự trên Người. Người sẽ loan báo công lý trước muôn dân.” Đây là lời ngôn sứ nào? (Mt 12,18)", "opts": [{"letter": "A", "text": "Ngôn sứ Giô-na", "correct": false}, {"letter": "B", "text": "Ngôn sứ Isaia", "correct": true}, {"letter": "C", "text": "Ngôn sứ Elia", "correct": false}, {"letter": "D", "text": "Ngôn sứ Giêremia", "correct": false}]}, {"id": 196, "q": "Khi chứng kiến việc Chúa Giêsu chữa một người bị quỷ ám vừa mù lại vừa câm, khiến anh nói và thấy được. Tất cả dân chúng đều sửng sốt và nói gì? (Mt 12,22-23)", "opts": [{"letter": "A", "text": "Ông này hẳn là ngôn sứ Elia", "correct": false}, {"letter": "B", "text": "Ông này chẳng phải là Đấng Cứu Thế hay sao?", "correct": false}, {"letter": "C", "text": "Ông này chẳng phải là Con vua Đavít sao?", "correct": true}, {"letter": "D", "text": "Hẳn ông này là Con Thiên Chúa", "correct": false}]}, {"id": 197, "q": "“Ông này trừ được quỷ chỉ là nhờ dựa thế quỷ vương Bêendêbun.” Câu này là của ai? (Mt 12,24)", "opts": [{"letter": "A", "text": "Những người Pharisêu", "correct": true}, {"letter": "B", "text": "Những người bị quỷ ám", "correct": false}, {"letter": "C", "text": "Người Do-thái", "correct": false}, {"letter": "D", "text": "Những người Sa-đốc", "correct": false}]}, {"id": 198, "q": "Ai nói phạm đến Con Người thì được tha; nhưng ai nói phạm đến ai sẽ chẳng được tha, cả đời này lẫn đời sau? (Mt 12,32)", "opts": [{"letter": "A", "text": "Nói phạm đến Thiên Chúa Cha", "correct": false}, {"letter": "B", "text": "Nói phạm đến Chúa Giêsu", "correct": false}, {"letter": "C", "text": "Nói phạm đến Thánh Thần", "correct": true}, {"letter": "D", "text": "Nói phạm đến các thánh thiên thần", "correct": false}]}, {"id": 199, "q": "Cây mà tốt thì quả cũng tốt; cây mà sâu thì quả cũng sâu, vì thế nào? (Mt 12,33)", "opts": [{"letter": "A", "text": "Xem cành thì biết quả", "correct": false}, {"letter": "B", "text": "Xem quả thì biết cây", "correct": true}, {"letter": "C", "text": "Xem cây ra lộc thì biết thời tiết", "correct": false}, {"letter": "D", "text": "Xem hạt thì biết giống", "correct": false}]}, {"id": 200, "q": "Những ai đến với Chúa Giêsu và nói : “Thưa Thầy, chúng tôi muốn thấy Thầy làm một dấu lạ.”? (Mt 12,38)", "opts": [{"letter": "A", "text": "Mấy kinh sư và mấy người Pharisêu", "correct": true}, {"letter": "B", "text": "Mấy người ngoại đạo", "correct": false}, {"letter": "C", "text": "Các môn đệ ông Gioan Tẩy Giả", "correct": false}, {"letter": "D", "text": "Các Thượng tế và lính canh Đền Thờ", "correct": false}]}, {"id": 201, "q": "Ngôn sứ nào đã ở trong bụng kình ngư ba ngày ba đêm? (Mt 12,40)", "opts": [{"letter": "A", "text": "Ngôn sứ Elia", "correct": false}, {"letter": "B", "text": "Ngôn sứ Isaia", "correct": false}, {"letter": "C", "text": "Ngôn sứ Giôna", "correct": true}, {"letter": "D", "text": "Ngôn sứ Edekiel", "correct": false}]}, {"id": 202, "q": "Trong cuộc phán xét, dân thành nào sẽ trỗi dậy cùng với thế hệ này và sẽ kết án họ, vì xưa dân ấy đã sám hối khi nghe ông Giôna rao giảng? (Mt 12,41)", "opts": [{"letter": "A", "text": "Dân Thành Xi-đôn", "correct": false}, {"letter": "B", "text": "Dân Thành Gô-mô-ra", "correct": false}, {"letter": "C", "text": "Dân thành Ninivê", "correct": true}, {"letter": "D", "text": "Dân thành Caphanaum", "correct": false}]}, {"id": 203, "q": "Hãy hoàn thành câu: “Đây là mẹ tôi, đây là anh em tôi. Vì phàm ai thi hành ý muốn của Cha tôi, Đấng ngự trên trời, ... ... ... .”? (Mt 12,49-50)", "opts": [{"letter": "A", "text": "Người ấy là anh chị em tôi, là mẹ tôi", "correct": true}, {"letter": "B", "text": "Người ấy là môn đệ tôi", "correct": false}, {"letter": "C", "text": "Người ấy là bạn hữu của Thầy", "correct": false}, {"letter": "D", "text": "Người ấy là anh em tôi và là con Thiên Chúa", "correct": false}]}, {"id": 204, "q": "Chúa Giêsu dùng dụ ngôn mà nói với dân chúng nhiều điều tại đâu? (Mt 13,1-3)", "opts": [{"letter": "A", "text": "Ven Biển Hồ", "correct": true}, {"letter": "B", "text": "Miền Thập Tỉnh", "correct": false}, {"letter": "C", "text": "Tại Giuse và Giêrusalem", "correct": false}, {"letter": "D", "text": "Trên các núi cao", "correct": false}]}, {"id": 205, "q": "Người gieo giống đi gieo, có những hạt rơi xuống vệ đường, thì thế nào? (Mt 13,4)", "opts": [{"letter": "A", "text": "Người ta sẽ thu lượm lại", "correct": false}, {"letter": "B", "text": "Chim chóc đến ăn mất", "correct": true}, {"letter": "C", "text": "Người ta chà đạp lên", "correct": false}, {"letter": "D", "text": "Hạt sẽ tự thối đi", "correct": false}]}, {"id": 206, "q": "Những hạt rơi ở đâu, chỗ đất không có nhiều; nó mọc ngay, vì đất không sâu; nhưng khi nắng lên, nó liền bị cháy, và vì thiếu rễ nên bị chết khô? (Mt 13,5-6)", "opts": [{"letter": "A", "text": "Trên nơi sỏi đá", "correct": true}, {"letter": "B", "text": "Hạt rơi ở bụi gai", "correct": false}, {"letter": "C", "text": "Hạt rơi xuống biển", "correct": false}, {"letter": "D", "text": "Hạt rơi chỗ bùn lầy", "correct": false}]}, {"id": 207, "q": "Những hạt rơi vào đâu thì bị chết nghẹt? (Mt 13,7)", "opts": [{"letter": "A", "text": "Rơi vào vườn nho", "correct": false}, {"letter": "B", "text": "Rơi vào bụi gai", "correct": true}, {"letter": "C", "text": "Rơi vào đất tốt", "correct": false}, {"letter": "D", "text": "Rơi ở vệ đường", "correct": false}]}, {"id": 208, "q": "Những hạt lại rơi nhằm đất tốt, nên sinh hoa kết quả thế nào? (Mt 13,8)", "opts": [{"letter": "A", "text": "Hạt được gấp trăm, hạt được sáu chục, hạt được ba chục", "correct": true}, {"letter": "B", "text": "Hạt nào cũng trổ sinh gấp trăm", "correct": false}, {"letter": "C", "text": "Hạt được gấp đôi, hạt được gấp mười, hạt được gấp trăm", "correct": false}, {"letter": "D", "text": "Sẽ được mùa màng bội thu", "correct": false}]}, {"id": 209, "q": "Hễ ai nghe lời rao giảng Nước Trời mà không hiểu, thì quỷ dữ đến cướp đi điều đã gieo trong lòng người ấy: đó là kẻ đã được gieo ở đâu? (Mt 13,19)", "opts": [{"letter": "A", "text": "Được gieo nơi đất tốt", "correct": false}, {"letter": "B", "text": "Được gieo ở vườn nho", "correct": false}, {"letter": "C", "text": "Được gieo bên vệ đường", "correct": true}, {"letter": "D", "text": "Được gieo ở ngoài đồng", "correct": false}]}, {"id": 210, "q": "Còn kẻ được gieo ở đâu, là kẻ nghe Lời và liền vui vẻ đón nhận. Nhưng nó không đâm rễ mà là kẻ nhất thời: khi gặp gian nan hay bị ngược đãi vì Lời, nó vấp ngã ngay? (Mt 13,20-21)", "opts": [{"letter": "A", "text": "Trên nơi sỏi đá", "correct": true}, {"letter": "B", "text": "Bên vệ đường", "correct": false}, {"letter": "C", "text": "Trên sườn núi", "correct": false}, {"letter": "D", "text": "Giữa cánh đồng", "correct": false}]}, {"id": 211, "q": "Kẻ được gieo vào đâu, là kẻ nghe Lời, nhưng nỗi lo lắng sự đời, và bả vinh hoa phú quý bóp nghẹt, khiến Lời không sinh hoa kết quả gì? (Mt 13,22)", "opts": [{"letter": "A", "text": "Được gieo vào bụi gai", "correct": true}, {"letter": "B", "text": "Được gieo vào đất tốt", "correct": false}, {"letter": "C", "text": "Được gieo vào nơi sỏi đá", "correct": false}, {"letter": "D", "text": "Được gieo nơi vệ đường", "correct": false}]}, {"id": 212, "q": "Kẻ được gieo trên đất tốt, là kẻ thế nào thì tất nhiên sinh hoa kết quả và làm ra, kẻ được gấp trăm, kẻ được sáu chục, kẻ được ba chục? (Mt 13,23)", "opts": [{"letter": "A", "text": "Người lắng nghe và thực hành", "correct": false}, {"letter": "B", "text": "Kẻ nghe Lời và hiểu", "correct": true}, {"letter": "C", "text": "Kẻ vâng phục thánh ý Thiên Chúa", "correct": false}, {"letter": "D", "text": "Người lắng nghe và đón nhận Lời Thiên Chúa", "correct": false}]}, {"id": 213, "q": "Điều gì ví như chuyện người kia gieo giống tốt trong ruộng mình. Khi mọi người đang ngủ, thì kẻ thù của ông đến gieo thêm cỏ lùng vào giữa lúa, rồi đi mất? (Mt 13,24-25)", "opts": [{"letter": "A", "text": "Nước Trời", "correct": true}, {"letter": "B", "text": "Sự sống đời đời", "correct": false}, {"letter": "C", "text": "Lời Chúa", "correct": false}, {"letter": "D", "text": "Ơn cứu độ", "correct": false}]}, {"id": 214, "q": "Đến ngày mùa, cỏ lùng được gom lại, bó thành bó để làm gì? (Mt 13,30)", "opts": [{"letter": "A", "text": "Để đốt đi", "correct": true}, {"letter": "B", "text": "Để thiêu huỷ", "correct": false}, {"letter": "C", "text": "Để làm củi", "correct": false}, {"letter": "D", "text": "Để làm phân bón", "correct": false}]}, {"id": 215, "q": "Nước Trời cũng giống như chuyện gì người nọ lấy gieo trong ruộng mình. Tuy nó là loại nhỏ nhất trong tất cả các hạt giống, nhưng khi lớn lên, thì lại là thứ lớn nhất; nó trở thành cây, đến nỗi chim trời tới làm tổ trên cành được? (Mt 13,31)", "opts": [{"letter": "A", "text": "Chuyện cây nho", "correct": false}, {"letter": "B", "text": "Chuyện hoa huệ ngoài đồng", "correct": false}, {"letter": "C", "text": "Chuyện hạt cải", "correct": true}, {"letter": "D", "text": "Chuyện hạt lúa mỳ", "correct": false}]}, {"id": 216, "q": "Trong dụ ngôn Cỏ Lùng, kẻ gieo hạt giống tốt là ai? (Mt 13,37)", "opts": [{"letter": "A", "text": "Con Người", "correct": true}, {"letter": "B", "text": "Các Thiên Thần", "correct": false}, {"letter": "C", "text": "Đấng Messia", "correct": false}, {"letter": "D", "text": "Chúa Giêsu", "correct": false}]}, {"id": 217, "q": "Trong dụ ngôn Cỏ Lùng, ruộng là gì? (Mt 13,38)", "opts": [{"letter": "A", "text": "Con cái thế gian", "correct": false}, {"letter": "B", "text": "Thế gian", "correct": true}, {"letter": "C", "text": "Dân ngoại", "correct": false}, {"letter": "D", "text": "Những người cần đến ơn cứu độ", "correct": false}]}, {"id": 218, "q": "Trong dụ ngôn Cỏ Lùng, hạt giống tốt là ai? (Mt 13,38)", "opts": [{"letter": "A", "text": "Con cái Thiên Chúa", "correct": false}, {"letter": "B", "text": "Các môn đệ của Chúa Giêsu", "correct": false}, {"letter": "C", "text": "Con cái Nước Trời", "correct": true}, {"letter": "D", "text": "Những người đi loan báo Tin Mừng", "correct": false}]}, {"id": 219, "q": "Trong dụ ngôn Cỏ Lùng, cỏ lùng là ai? (Mt 13,38)", "opts": [{"letter": "A", "text": "Con cái Ác Thần", "correct": true}, {"letter": "B", "text": "Ma quỉ", "correct": false}, {"letter": "C", "text": "Những người tội lỗi", "correct": false}, {"letter": "D", "text": "Dân ngoại", "correct": false}, {"letter": "E", "text": "Những Kinh sư", "correct": false}]}, {"id": 220, "q": "Trong dụ ngôn Cỏ Lùng, kẻ thù gieo cỏ lùng là ai? (Mt 13,39)", "opts": [{"letter": "A", "text": "Ma quỷ", "correct": true}, {"letter": "B", "text": "Các Kinh sư", "correct": false}, {"letter": "C", "text": "Các vua chúa trần gian", "correct": false}, {"letter": "D", "text": "Đế quốc Rôma", "correct": false}]}, {"id": 221, "q": "Trong dụ ngôn Cỏ Lùng, mùa gặ let reviewFilter='all';
let cfg={count:50, shuffle:true};

/* ── CONFIG PILLS ── */
['cnt','shuf'].forEach(g=>{
  document.querySelectorAll('#'+g+'-pills .pill').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('#'+g+'-pills .pill').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      if(g==='cnt'){
        const v=btn.dataset.v;
        cfg.count=v==='all'?ALL.length:+v;
        document.getElementById('st-n').textContent=v==='all'?ALL.length:v;
      } else { cfg.shuffle=btn.dataset.v==='1'; }
    });
  });
});

/* ── UTILS ── */
function rnd(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function show(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='none';});
  const el=document.getElementById(id);
  el.style.display='block'; void el.offsetWidth; el.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ── ACTION ROW STATE ──
   State A (before answering, no history) : hidden
   State B (before answering, has history): show btn-prev only, full-width (column)
   State C (after answering)              : show both side by side (row)
*/
function updateActionRow(){
  const row  = document.getElementById('action-row');
  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');

  if (!answered) {
    // Before answering
    next.style.display = 'none';
    if (history.length > 0) {
      row.classList.add('show');
      row.classList.remove('side-by-side');
      prev.style.display = 'block';
    } else {
      row.classList.remove('show');
    }
  } else {
    // After answering — side by side
    row.classList.add('show', 'side-by-side');
    prev.style.display = 'block';
    next.style.display = 'block';
    // Update next button label
    next.textContent = cur+1 >= qs.length ? '🏁 Xem kết quả' : 'Câu tiếp theo →';
  }
}

/* ── START ── */
function startQuiz(){
  qs=rnd(ALL).slice(0,Math.min(cfg.count,ALL.length));
  cur=0; okCount=0; badCount=0; answered=false; history=[];
  updateBadge(); show('s-quiz'); render();
}

function render(){
  const q=qs[cur]; answered=false;
  const tot=qs.length, pct=Math.round(cur/tot*100);

  if(type==='fill_in_the_blank'){

    document.getElementById('sp-fill-btn').disabled=false;

    const inp='<input id="sp-blank" class="blank-sp" type="text" autocomplete="off" placeholder="..."/>';
    if(text.includes('... ... ...')) text=text.replace('... ... ...',inp);
    else if(text.includes('...'))   text=text.replace('...',inp);
    else text=text.replace(/\?$/,'')+' '+inp;
    document.getElementById('q-txt').innerHTML=text;
    setTimeout(()=>{
      const el=document.getElementById('sp-blank');
      if(el){el.focus();el.onkeypress=e=>{if(e.key==='Enter')submitFill();};}
    },100);

  }else if(type==='arrange_words'){
    badge.innerHTML='<span class="type-badge tb-arr">🧩 Sắp xếp câu</span>';
    optsEl.style.display='none'; arrArea.style.display='block';
    document.getElementById('sp-arr-btn').disabled=false;
    document.getElementById('q-txt').textContent=(q.question||q.q||'')
      .replace(' (Sắp xếp các từ sau thành câu hoàn chỉnh)','');
    const src=document.getElementById('sp-source');
    const tgt=document.getElementById('sp-target');
    src.innerHTML=''; tgt.innerHTML=''; tgt.classList.remove('has-chip');
    (q.shuffled_words||[]).forEach(word=>{
      const c=document.createElement('span');
      c.className='wchip'; c.textContent=word;
      c.onclick=()=>moveWChip(c,'target');
      src.appendChild(c);
    });

  }else{
    document.getElementById('q-txt').textContent=q.q||q.question||'';
    let opts=[...q.opts];
    if(cfg.shuffle) opts=rnd(opts);
    const labels=['A','B','C','D','E','F','G'];
    optsEl.style.display='flex'; optsEl.innerHTML='';
    opts.forEach((o,i)=>{
      const btn=document.createElement('button');
      btn.className='opt';
      btn.innerHTML=`<span class="oletter">${labels[i]}</span><span>${o.text}</span>`;
      btn.dataset.correct=o.correct?'1':'0';
      btn.dataset.text=o.text;
      btn.addEventListener('click',()=>select(btn,opts));
      optsEl.appendChild(btn);
    });
  }
  updateActionRow();
}

function moveWChip(chip,dest){
  const src=document.getElementById('sp-source');
  const tgt=document.getElementById('sp-target');
  if(dest==='target'){chip.onclick=()=>moveWChip(chip,'source');tgt.appendChild(chip);}
  else{chip.onclick=()=>moveWChip(chip,'target');src.appendChild(chip);}
  tgt.classList.toggle('has-chip',tgt.children.length>0);
}
function normStr(s){
  return String(s).toLowerCase().replace(/[.,!?;:\"\u2018\u2019\u201c\u201d()]/g,'').replace(/\s+/g,' ').trim();
}
function submitFill(){
  const inp=document.getElementById('sp-blank');
  if(!inp||!inp.value.trim()){alert('Nhập câu trả lời đi!');return;}
  const q=qs[cur]; const correct=normStr(inp.value)===normStr(q.answer||'');
  inp.disabled=true; document.getElementById('sp-fill-btn').disabled=true;
  answered=true;
  if(correct){okCount++;showFb(true,'✅ Chính xác!');}
  else{badCount++;showFb(false,`❌ Sai! Đáp án đúng: ${q.answer||''}`);}
  history.push({idx:cur,q:qs[cur],opts:[],yourText:inp.value,yourCorrect:correct,isSpecial:true,answer:q.answer});
  updateBadge();
  document.getElementById('sc-txt').innerHTML=`✓ ${okCount} &nbsp;✗ ${badCount}`;
  updateActionRow();
}
function submitArrange(){
  const chips=document.getElementById('sp-target').children;
  if(!chips.length){alert('Bấm chọn các từ để ghép câu đi!');return;}
  const q=qs[cur];
  const userAns=Array.from(chips).map(c=>c.textContent).join(' ');
  const correct=normStr(userAns)===normStr(q.answer||'');
  document.querySelectorAll('.wchip').forEach(c=>c.classList.add('dis'));
  document.getElementById('sp-arr-btn').disabled=true;
  answered=true;
  if(correct){okCount++;showFb(true,'✅ Chính xác!');}
  else{badCount++;showFb(false,`❌ Sai! Đáp án đúng: ${q.answer||''}`);}
  history.push({idx:cur,q:qs[cur],opts:[],yourText:userAns,yourCorrect:correct,isSpecial:true,answer:q.answer});
  updateBadge();
  document.getElementById('sc-txt').innerHTML=`✓ ${okCount} &nbsp;✗ ${badCount}`;
  updateActionRow();
}

/* ── SELECT ── */
function select(btn,opts){
  if(answered) return;
  answered=true;
  const isOk=btn.dataset.correct==='1';
  const correctOpt=opts.find(o=>o.correct);

  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    if(b.dataset.correct==='1') b.classList.add('ok');
  });
  if(isOk){btn.classList.add('ok');okCount++;showFb(true,'✅ Chính xác!');}
  else{btn.classList.add('bad');badCount++;showFb(false,`❌ Sai! Đáp án đúng: ${correctOpt?correctOpt.text:''}`);}

  history.push({idx:cur, q:qs[cur], opts, yourText:btn.dataset.text, yourCorrect:isOk});
  updateBadge();
  document.getElementById('sc-txt').innerHTML=`✓ ${okCount} &nbsp;✗ ${badCount}`;
  updateActionRow();  // switch to side-by-side
}

function showFb(ok,msg){
  const el=document.getElementById('fb');
  el.textContent=msg; el.className='fb '+(ok?'ok':'bad'); el.style.display='block';
}
function updateBadge(){
  document.getElementById('review-badge').textContent=history.length;
}

/* ── NEXT ── */
function next(){
  cur++;
  if(cur>=qs.length){result();} else {render(); window.scrollTo({top:0,behavior:'smooth'});}
}

/* ── REVIEW LAST (câu vừa làm) ── */
function reviewLast(){
  if(!history.length) return;
  openDetail(history[history.length-1].idx);
}

/* ── RESULT ── */
function result(){
  show('s-result');
  const tot=qs.length, pct=Math.round(okCount/tot*100);
  let emoji='😢',title='Cần cố gắng hơn!';
  if(pct>=95){emoji='🏆';title='Xuất sắc!';}
  else if(pct>=80){emoji='🎉';title='Rất giỏi!';}
  else if(pct>=60){emoji='👍';title='Khá tốt!';}
  else if(pct>=40){emoji='📖';title='Cần ôn thêm!';}
  document.getElementById('r-emoji').textContent=emoji;
  document.getElementById('r-title').textContent=title;
  document.getElementById('r-sub').textContent=`Bạn trả lời đúng ${okCount} / ${tot} câu`;
  document.getElementById('r-ok').textContent=okCount;
  document.getElementById('r-err').textContent=badCount;
  document.getElementById('r-tot').textContent=tot;
  document.getElementById('r-pct').textContent=pct+'%';
  setTimeout(()=>{
    const C=345;
    document.getElementById('r-ring').style.strokeDashoffset=C-(pct/100)*C;
  },150);
}

/* ── REVIEW PANEL (toàn bộ) ── */
function openReview(){
  if(!history.length){alert('Chưa có câu nào được trả lời.');return;}
  renderPanel();
  document.getElementById('review-overlay').style.display='block';
  document.getElementById('review-panel').style.display='flex';
  document.getElementById('review-panel').style.flexDirection='column';
}
function closeReview(){
  document.getElementById('review-overlay').style.display='none';
  document.getElementById('review-panel').style.display='none';
}
function setFilter(f){
  reviewFilter=f;
  document.querySelectorAll('.rp-tab').forEach(t=>t.classList.toggle('on',t.dataset.f===f));
  renderPanel();
}
function renderPanel(){
  const ok=history.filter(h=>h.yourCorrect).length, bad=history.length-ok;
  document.getElementById('rp-stats').textContent=`${ok} câu đúng · ${bad} câu sai · ${history.length} tổng`;
  let list=history;
  if(reviewFilter==='ok') list=history.filter(h=>h.yourCorrect);
  if(reviewFilter==='bad') list=history.filter(h=>!h.yourCorrect);
  const body=document.getElementById('rp-body');
  if(!list.length){
    const msg=reviewFilter==='ok'?'Chưa có câu đúng nào 😢':reviewFilter==='bad'?'🎉 Không có câu sai!':'Chưa trả lời câu nào';
    body.innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted);font-size:14px">${msg}</div>`;
    return;
  }
  body.innerHTML=list.map(h=>{
    const qText = h.q.q || h.q.question || '';
    const shortQ = qText.length>80 ? qText.slice(0,80)+'…' : qText;
    let yourTag;
    if(h.isSpecial){
      const truncated = (h.yourText||'').slice(0,50)+((h.yourText||'').length>50?'…':'');
      if(h.yourCorrect){
        yourTag=`<span class="rp-ans-tag ok-tag">✓ ${truncated}</span>`;
      } else {
        const ans=(h.answer||'').slice(0,50)+((h.answer||'').length>50?'…':'');
        yourTag=`<span class="rp-ans-tag bad-tag">✗ ${truncated}</span>
          <span class="rp-ans-tag cor-tag">✓ ${ans}</span>`;
      }
    } else {
      const correctOpt=h.opts.find(o=>o.correct);
      const truncated = h.yourText.slice(0,50)+(h.yourText.length>50?'…':'');
      yourTag=h.yourCorrect
        ?`<span class="rp-ans-tag ok-tag">✓ ${truncated}</span>`
        :`<span class="rp-ans-tag bad-tag">✗ ${truncated}</span>
          <span class="rp-ans-tag cor-tag">✓ ${correctOpt?correctOpt.text.slice(0,50)+(correctOpt.text.length>50?'…':''):''}</span>`;
    }
    return `<div class="rp-item ${h.yourCorrect?'is-ok':'is-bad'}" onclick="openDetail(${h.idx});closeReview()">
      <div class="rp-item-hdr">
        <span class="rp-item-num">Câu ${h.idx+1} · #${h.q.id}</span>
        <span class="rp-item-icon">${h.yourCorrect?'✅':'❌'}</span>
      </div>
      <div class="rp-item-q">${shortQ}</div>
      <div class="rp-item-ans">${yourTag}</div>
    </div>`;
  }).join('');
}

/* ── DETAIL MODAL ── */
function openDetail(qIdx){
  const h=history.find(x=>x.idx===qIdx);
  if(!h) return;
  const badge=document.getElementById('dm-badge');
  badge.textContent=h.yourCorrect?'✅ Trả lời đúng':'❌ Trả lời sai';
  badge.className='dm-badge '+(h.yourCorrect?'ok-badge':'bad-badge');
  const qText = h.q.q || h.q.question || '';
  document.getElementById('dm-num').textContent=`Câu ${h.idx+1} · #${h.q.id}`;
  document.getElementById('dm-q').textContent=qText;

  if(h.isSpecial){
    const typeLabel = (h.q.type==='fill_in_the_blank') ? '✍️ Điền từ vào chỗ trống' : '🧩 Sắp xếp câu';
    document.getElementById('dm-opts').innerHTML=`
      <div style="margin-bottom:8px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px">${typeLabel}</div>
      <div class="dm-opt ${h.yourCorrect?'dm-ok':'dm-bad'}">
        <span class="dm-letter">${h.yourCorrect?'✓':'✗'}</span>
        <span style="flex:1">${h.yourText||'(không trả lời)'}</span>
        <span class="dm-tag ${h.yourCorrect?'t-ok':'t-bad'}">${h.yourCorrect?'Đúng · Bạn chọn':'Bạn chọn'}</span>
      </div>
      ${!h.yourCorrect?`
      <div class="dm-opt dm-ok" style="margin-top:8px">
        <span class="dm-letter">✓</span>
        <span style="flex:1">${h.answer||''}</span>
        <span class="dm-tag t-ok">Đáp án đúng</span>
      </div>`:''}
    `;
  } else {
    const labels=['A','B','C','D','E','F','G'];
    document.getElementById('dm-opts').innerHTML=h.opts.map((o,i)=>{
      const isCorrect=o.correct, isYour=o.text===h.yourText;
      let cls='dm-neutral', tag='';
      if(isCorrect&&isYour){cls='dm-ok'; tag='<span class="dm-tag t-ok">✓ Đúng · Bạn chọn</span>';}
      else if(isCorrect){cls='dm-ok'; tag='<span class="dm-tag t-ok">✓ Đáp án đúng</span>';}
      else if(isYour){cls='dm-bad'; tag='<span class="dm-tag t-bad">✗ Bạn chọn</span>';}
      return `<div class="dm-opt ${cls}">
        <span class="dm-letter">${labels[i]}</span>
        <span style="flex:1">${o.text}</span>${tag}
      </div>`;
    }).join('');
  }
  document.getElementById('detail-modal').classList.add('open');
}
function closeDetail(e){
  if(e&&e.target!==document.getElementById('detail-modal')) return;
  document.getElementById('detail-modal').classList.remove('open');
}

/* ── NAVIGATION ── */
function restartQuiz(){ closeReview(); show('s-start'); setTimeout(startQuiz,50); }
function goHome(){ closeReview(); show('s-start'); }
function confirmQuit(){ if(confirm('Thoát bài làm hiện tại?')) goHome(); }

/* Load them 50 cau dac biet */
fetch('./quiz_data_new.json').then(r=>r.json()).then(data=>{ALL.push(...data);}).catch(()=>{});
