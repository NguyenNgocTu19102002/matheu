<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Quiz Mát-thêu — Người chơi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f172a;--sur:#1e293b;--bdr:#334155;
      --txt:#f1f5f9;--muted:#94a3b8;
      --ok:#22c55e;--err:#ef4444;--acc:#3b82f6;
    }
    html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt)}
    body{display:flex;flex-direction:column;align-items:center;justify-content:center;
         min-height:100%;padding:16px;overflow-x:hidden}

    .screen{display:none;width:100%;max-width:480px;animation:up .3s ease}
    .screen.on{display:flex;flex-direction:column;align-items:center}
    @keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    /* ── JOIN ── */
    #s-join .logo{font-size:56px;margin-bottom:12px;animation:bob 3s ease-in-out infinite}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    #s-join h1{font-size:22px;font-weight:800;margin-bottom:4px;text-align:center}
    #s-join p{color:var(--muted);font-size:13px;margin-bottom:28px;text-align:center}

    .field{width:100%;margin-bottom:14px}
    .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);
                  text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .field input{width:100%;padding:14px 16px;background:var(--sur);border:1.5px solid var(--bdr);
                 border-radius:12px;color:var(--txt);font-family:inherit;font-size:16px;
                 outline:none;transition:border-color .18s;-webkit-appearance:none}
    .field input:focus{border-color:var(--acc)}
    .field input.code{text-transform:uppercase;letter-spacing:4px;font-size:20px;font-weight:700;
                      text-align:center}
    .err{color:#f87171;font-size:13px;margin-bottom:12px;text-align:center;min-height:20px}
    .btn{width:100%;padding:15px;background:var(--acc);color:#fff;font-family:inherit;
         font-size:16px;font-weight:700;border:none;border-radius:12px;cursor:pointer;
         transition:all .18s;-webkit-appearance:none}
    .btn:active{transform:scale(.97)}
    .btn:disabled{opacity:.5;cursor:default}
    .btn.sec{background:var(--sur);border:1.5px solid var(--bdr);color:var(--txt)}

    /* ── LOBBY ── */
    #s-lobby{text-align:center}
    #s-lobby .pulse{font-size:48px;animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
    #s-lobby h2{font-size:20px;font-weight:700;margin:12px 0 4px}
    #s-lobby .nick{font-size:26px;font-weight:800;color:var(--acc)}
    #s-lobby .wait{color:var(--muted);font-size:14px;margin-top:8px}
    .wave{display:inline-flex;gap:4px;margin-top:20px}
    .wave span{width:8px;height:8px;border-radius:50%;background:var(--acc);
               animation:wave 1.4s ease-in-out infinite}
    .wave span:nth-child(2){animation-delay:.2s}
    .wave span:nth-child(3){animation-delay:.4s}
    @keyframes wave{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

    /* ── QUESTION ── */
    #s-question{width:100%}
    .q-header{display:flex;align-items:center;justify-content:space-between;
               margin-bottom:14px;gap:12px}
    .q-num{font-size:12px;font-weight:700;color:var(--muted);
           text-transform:uppercase;letter-spacing:.5px}
    .timer-ring{position:relative;width:52px;height:52px;flex-shrink:0}
    .timer-ring svg{transform:rotate(-90deg)}
    .timer-bg{fill:none;stroke:#334155;stroke-width:5}
    .timer-fill{fill:none;stroke:var(--acc);stroke-width:5;stroke-linecap:round;
                stroke-dasharray:126;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear}
    .timer-fill.warn{stroke:#f59e0b}
    .timer-fill.danger{stroke:var(--err)}
    .timer-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
               font-size:16px;font-weight:800;color:var(--txt)}

    .q-card{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;
            padding:20px 18px;margin-bottom:16px;width:100%}
    .q-text{font-size:clamp(14px,4vw,17px);line-height:1.65;font-weight:600;text-align:center}

    .opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
    .opt-btn{padding:18px 12px;border:none;border-radius:14px;font-family:inherit;
             font-size:14px;font-weight:700;color:#fff;cursor:pointer;
             transition:transform .15s,box-shadow .15s;text-align:center;
             line-height:1.35;min-height:80px;display:flex;align-items:center;
             justify-content:center;-webkit-appearance:none;word-break:break-word}
    .opt-btn:active:not(:disabled){transform:scale(.94)}
    .opt-btn:disabled{cursor:default;transform:none}
    .opt-btn.A{background:linear-gradient(135deg,#ef4444,#dc2626)}
    .opt-btn.B{background:linear-gradient(135deg,#3b82f6,#2563eb)}
    .opt-btn.C{background:linear-gradient(135deg,#f59e0b,#d97706)}
    .opt-btn.D{background:linear-gradient(135deg,#22c55e,#16a34a)}
    .opt-btn.E{background:linear-gradient(135deg,#a855f7,#9333ea)}
    .opt-btn.F{background:linear-gradient(135deg,#ec4899,#db2777)}
    .opt-btn.dim{opacity:.35}
    .opt-btn.correct{outline:4px solid #fff;box-shadow:0 0 20px rgba(255,255,255,.3)}
    .opt-label{display:block;font-size:11px;opacity:.75;margin-bottom:4px}

    /* ── ANSWERED ── */
    #s-answered{text-align:center}
    #s-answered .icon{font-size:52px;margin-bottom:12px}
    #s-answered h2{font-size:20px;font-weight:700;margin-bottom:6px}
    #s-answered p{color:var(--muted);font-size:14px}
    .pts{font-size:40px;font-weight:800;color:var(--ok);margin:12px 0}
    .pts.zero{color:var(--err)}

    /* ── REVEAL ── */
    #s-reveal{width:100%;text-align:center}
    .reveal-badge{display:inline-block;padding:10px 24px;border-radius:99px;font-size:18px;
                  font-weight:800;margin-bottom:16px}
    .reveal-badge.ok{background:rgba(34,197,94,.15);color:#4ade80;border:1.5px solid rgba(34,197,94,.3)}
    .reveal-badge.bad{background:rgba(239,68,68,.1);color:#f87171;border:1.5px solid rgba(239,68,68,.3)}
    .reveal-pts{font-size:32px;font-weight:800;margin-bottom:4px}
    .reveal-pts .val{color:var(--ok)}
    .reveal-pts .zero{color:var(--err)}
    .reveal-total{color:var(--muted);font-size:13px;margin-bottom:20px}
    .mini-lb{width:100%;background:var(--sur);border:1px solid var(--bdr);border-radius:14px;
              overflow:hidden;margin-bottom:20px}
    .mini-lb-title{padding:10px 16px;font-size:11px;font-weight:700;color:var(--muted);
                   text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bdr)}
    .lb-row{display:flex;align-items:center;gap:12px;padding:10px 16px;
            border-bottom:1px solid #1e293b}
    .lb-row:last-child{border-bottom:none}
    .lb-row.me{background:rgba(59,130,246,.08)}
    .lb-rank{font-size:13px;font-weight:800;min-width:24px;color:var(--muted)}
    .lb-rank.gold{color:#fbbf24} .lb-rank.silver{color:#94a3b8} .lb-rank.bronze{color:#cd7c4a}
    .lb-nick{flex:1;font-size:14px;font-weight:600;text-align:left}
    .lb-score{font-size:14px;font-weight:700;color:var(--acc)}

    /* ── GAMEOVER ── */
    #s-gameover{text-align:center;width:100%}
    #s-gameover .trophy{font-size:64px;margin-bottom:16px;animation:bounce .6s ease infinite alternate}
    @keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
    #s-gameover h2{font-size:24px;font-weight:800;margin-bottom:4px}
    #s-gameover .rank-txt{font-size:16px;color:var(--muted);margin-bottom:24px}

    /* ── HOST LEFT ── */
    #s-hostleft{text-align:center}
    #s-hostleft .icon{font-size:52px;margin-bottom:16px}
  </style>
</head>
<body>

<!-- JOIN -->
<div id="s-join" class="screen on">
  <div class="logo">✝️</div>
  <h1>Trắc nghiệm Mát-thêu</h1>
  <p>Nhập mã phòng để tham gia</p>
  <div class="field">
    <label>Mã phòng</label>
    <input id="inp-code" class="code" type="text" maxlength="6" placeholder="ABC123" autocomplete="off" spellcheck="false"/>
  </div>
  <div class="field">
    <label>Nickname</label>
    <input id="inp-nick" type="text" maxlength="20" placeholder="Tên của bạn..." autocomplete="off"/>
  </div>
  <div class="err" id="join-err"></div>
  <button class="btn" onclick="joinRoom()">▶ Tham gia</button>
</div>

<!-- LOBBY -->
<div id="s-lobby" class="screen">
  <div class="pulse">🙌</div>
  <h2>Xin chào,</h2>
  <div class="nick" id="lb-nick"></div>
  <p class="wait">Đang chờ host bắt đầu cuộc thi...</p>
  <div class="wave"><span></span><span></span><span></span></div>
</div>

<!-- QUESTION -->
<div id="s-question" class="screen">
  <div class="q-header">
    <div class="q-num" id="q-label"></div>
    <div class="timer-ring">
      <svg width="52" height="52" viewBox="0 0 52 52">
        <circle class="timer-bg" cx="26" cy="26" r="20"/>
        <circle class="timer-fill" id="timer-fill" cx="26" cy="26" r="20"/>
      </svg>
      <div class="timer-num" id="timer-num">20</div>
    </div>
  </div>
  <div class="q-card">
    <div class="q-text" id="q-text"></div>
  </div>
  <div class="opt-grid" id="opt-grid"></div>
</div>

<!-- ANSWERED (waiting for reveal) -->
<div id="s-answered" class="screen">
  <div class="icon" id="ans-icon">⏳</div>
  <h2 id="ans-title">Đã gửi đáp án!</h2>
  <p id="ans-sub">Đang chờ người khác trả lời...</p>
</div>

<!-- REVEAL -->
<div id="s-reveal" class="screen">
  <div class="reveal-badge" id="rv-badge"></div>
  <div class="reveal-pts"><span id="rv-pts"></span></div>
  <div class="reveal-total" id="rv-total"></div>
  <div class="mini-lb" id="mini-lb"></div>
  <p style="color:var(--muted);font-size:13px;text-align:center">Đang chờ câu tiếp theo...</p>
</div>

<!-- GAME OVER -->
<div id="s-gameover" class="screen">
  <div class="trophy" id="go-trophy">🏆</div>
  <h2 id="go-title"></h2>
  <p class="rank-txt" id="go-rank"></p>
  <div class="mini-lb" id="go-lb"></div>
  <button class="btn sec" style="margin-top:16px" onclick="goHome()">🔄 Chơi lại</button>
</div>

<!-- HOST LEFT -->
<div id="s-hostleft" class="screen">
  <div class="icon">😢</div>
  <h2 style="margin-bottom:8px">Cuộc thi đã kết thúc</h2>
  <p style="color:var(--muted);font-size:14px;margin-bottom:20px" id="hl-msg">Host đã rời phòng.</p>
  <button class="btn" onclick="goHome()">🏠 Về trang chủ</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myNick = '', timerInterval = null, currentTimePerQ = 20;
const COLORS = ['A','B','C','D','E','F'];

/* ── Screens ── */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('on');
    s.style.display = 'none';
  });
  const el = document.getElementById(id);
  el.style.display = 'flex';
  void el.offsetWidth;
  el.classList.add('on');
}

/* ── Join ── */
function joinRoom() {
  const code = document.getElementById('inp-code').value.toUpperCase().trim();
  const nick = document.getElementById('inp-nick').value.trim();
  document.getElementById('join-err').textContent = '';
  if (!code) return setErr('Nhập mã phòng!');
  if (!nick) return setErr('Nhập nickname!');
  socket.emit('player:join', { code, nickname: nick });
}
function setErr(msg) { document.getElementById('join-err').textContent = msg; }

document.getElementById('inp-code').addEventListener('input', e => {
  e.target.value = e.target.value.toUpperCase();
});
document.getElementById('inp-nick').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinRoom();
});
document.getElementById('inp-code').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inp-nick').focus();
});

/* ── Timer ── */
function startTimer(secs) {
  clearInterval(timerInterval);
  const circ = 126; // 2π × 20
  let remaining = secs;
  const fill = document.getElementById('timer-fill');
  const num = document.getElementById('timer-num');

  function tick() {
    const ratio = remaining / secs;
    fill.style.strokeDashoffset = circ * (1 - ratio);
    fill.className = 'timer-fill' + (remaining <= 5 ? ' danger' : remaining <= 10 ? ' warn' : '');
    num.textContent = remaining;
    if (remaining <= 0) clearInterval(timerInterval);
    remaining--;
  }
  tick();
  timerInterval = setInterval(tick, 1000);
}

/* ── Leaderboard render ── */
function renderMiniLb(lb, myNick, containerId) {
  const medals = ['🥇','🥈','🥉'];
  const rankCls = ['gold','silver','bronze'];
  document.getElementById(containerId).innerHTML =
    `<div class="mini-lb-title">🏆 Bảng xếp hạng</div>` +
    lb.map(p => `
      <div class="lb-row${p.nickname===myNick?' me':''}">
        <span class="lb-rank ${rankCls[p.rank-1]||''}">${medals[p.rank-1]||p.rank}</span>
        <span class="lb-nick">${p.nickname}${p.nickname===myNick?' 👈':''}</span>
        <span class="lb-score">${p.score.toLocaleString()}</span>
      </div>`).join('');
}

function goHome() { location.reload(); }

/* ── Socket Events ── */
socket.on('player:error', ({ msg }) => setErr(msg));

socket.on('player:joined', ({ nickname }) => {
  myNick = nickname;
  document.getElementById('lb-nick').textContent = nickname;
  show('s-lobby');
});

socket.on('game:start', () => {
  clearInterval(timerInterval);
});

socket.on('player:question', ({ index, total, text, opts, timePerQ }) => {
  currentTimePerQ = timePerQ;
  document.getElementById('q-label').textContent = `Câu ${index+1} / ${total}`;
  document.getElementById('q-text').textContent = text;

  const grid = document.getElementById('opt-grid');
  grid.innerHTML = opts.map((o, i) => `
    <button class="opt-btn ${COLORS[i]}" onclick="answer(${i})">
      <span>
        <span class="opt-label">${COLORS[i]}</span>
        ${o}
      </span>
    </button>`).join('');

  show('s-question');
  startTimer(timePerQ);
});

let answerStart = 0;
document.addEventListener('DOMContentLoaded', () => {});

socket.on('player:question', () => { answerStart = Date.now(); });

function answer(idx) {
  const timeMs = Date.now() - answerStart;
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  socket.emit('player:answer', { index: idx, timeMs });

  // Optimistic UI
  document.getElementById('ans-icon').textContent = '⌛';
  document.getElementById('ans-title').textContent = 'Đã gửi đáp án!';
  document.getElementById('ans-sub').textContent = 'Đang chờ mọi người...';
  show('s-answered');
}

socket.on('player:ack', ({ correct, points }) => {
  document.getElementById('ans-icon').textContent = correct ? '✅' : '❌';
  document.getElementById('ans-title').textContent = correct ? 'Chính xác! 🎉' : 'Sai rồi!';
  document.getElementById('ans-sub').textContent = correct
    ? `+${points} điểm!`
    : 'Đang chờ kết quả...';
});

socket.on('player:reveal', ({ correctIndex, yourIndex, correct, points, totalScore, leaderboard, hasNext }) => {
  clearInterval(timerInterval);

  // Badge
  const badge = document.getElementById('rv-badge');
  badge.textContent = correct ? '✅ Chính xác!' : yourIndex === -1 ? '⏰ Hết giờ!' : '❌ Sai rồi!';
  badge.className = 'reveal-badge ' + (correct ? 'ok' : 'bad');

  // Points
  const pEl = document.getElementById('rv-pts');
  pEl.innerHTML = correct
    ? `<span class="val">+${points.toLocaleString()} điểm</span>`
    : `<span class="zero">+0 điểm</span>`;

  document.getElementById('rv-total').textContent = `Tổng điểm: ${totalScore.toLocaleString()}`;

  renderMiniLb(leaderboard, myNick, 'mini-lb');
  show('s-reveal');
});

socket.on('game:over', ({ leaderboard }) => {
  clearInterval(timerInterval);
  const me = leaderboard.find(p => p.nickname === myNick);
  const rank = me ? me.rank : leaderboard.length + 1;
  const emojis = ['🥇','🥈','🥉'];
  document.getElementById('go-trophy').textContent = emojis[rank-1] || '🎖️';
  document.getElementById('go-title').textContent =
    rank === 1 ? 'Vô địch!' : rank <= 3 ? 'Xuất sắc!' : 'Cảm ơn đã tham gia!';
  document.getElementById('go-rank').textContent =
    `Bạn xếp hạng ${rank} / ${leaderboard.length} người`;
  renderMiniLb(leaderboard.slice(0, 10), myNick, 'go-lb');
  show('s-gameover');
});

socket.on('game:host-left', ({ msg }) => {
  clearInterval(timerInterval);
  document.getElementById('hl-msg').textContent = msg;
  show('s-hostleft');
});
</script>
</body>
</html>
